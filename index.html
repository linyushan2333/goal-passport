<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Passport - 目标护照</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📕</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-brand" data-navigate="dashboard">📕 Goal Passport</div>

    <div class="nav-links">
      <button class="nav-btn active" data-navigate="dashboard">仪表盘</button>
      <button class="nav-btn" data-navigate="calendar">日历</button>
      <button class="nav-btn" data-navigate="cards">卡牌图鉴</button>
      <button class="nav-btn" data-navigate="shop">愿望商城</button>
    </div>
  </nav>

  <main class="container">
    <!-- 仪表盘 -->
    <section id="view-dashboard" class="view active">
      <div class="dashboard-header">
        <div>
          <h1>我的目标</h1>
          <p class="slogan">一步一城，目标即旅途</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-sm" id="btn-export">导出数据</button>
          <label class="btn btn-sm" id="btn-import-label">导入数据
            <input type="file" id="btn-import" accept=".json" style="display:none;">
          </label>
          <button class="btn btn-primary" id="btn-new-goal">+ 新建目标</button>
        </div>
      </div>
      <div class="dashboard-stats">
        <div class="stat-card glass">
          <div id="overall-chart" class="donut-container"></div>
          <div class="stat-text">
            <span class="stat-label">整体完成率</span>
            <span class="stat-value" id="overall-rate">0%</span>
          </div>
        </div>
      </div>
      <div class="goals-list" id="goals-list"></div>

      <!-- 已归档目标折叠区 -->
      <div class="archived-section" id="archived-section" style="display:none;">
        <button class="archived-toggle" id="btn-toggle-archived">
          <span>📦 已归档目标</span>
          <span class="archived-count" id="archived-count">0</span>
          <span class="archived-chevron" id="archived-chevron">▶</span>
        </button>
        <div class="archived-list" id="archived-list" style="display:none;"></div>
      </div>
    </section>

    <!-- 目标详情 -->
    <section id="view-detail" class="view">
      <button class="btn-back" data-navigate="dashboard">&larr; 返回</button>
      <div class="detail-header">
        <h1 id="detail-name"></h1>
        <div class="detail-actions">
          <button class="btn btn-sm" id="btn-edit-goal">编辑</button>
          <button class="btn btn-sm btn-danger" id="btn-delete-goal">归档</button>
        </div>
      </div>
      <div class="detail-progress glass" id="detail-progress-container"></div>
      <div class="detail-reward glass" id="detail-reward"></div>

      <!-- 打卡备注 -->
      <div class="checkin-note-container">
        <input type="text" id="checkin-note-input" class="glass-input" placeholder="写一句备注（可选）...">
      </div>

      <!-- 次数打卡 -->
      <div class="checkin-section" id="checkin-count" style="display:none;">
        <button class="btn btn-checkin" id="btn-checkin-count">打卡 +1</button>
      </div>
      <!-- 时长打卡 -->
      <div class="checkin-section" id="checkin-time" style="display:none;">
        <div class="timer-display" id="timer-display">00:00:00</div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="btn-timer-start">开始</button>
          <button class="btn" id="btn-timer-pause" disabled>暂停</button>
          <button class="btn btn-danger" id="btn-timer-stop" disabled>停止并记录</button>
        </div>
      </div>
      <!-- 手动补录按钮 -->
      <div class="manual-add-section" id="manual-add-section" style="display:none;">
        <button class="btn btn-manual-add" id="btn-manual-add">📝 手动补录</button>
      </div>
      <div class="history-section">
        <h3>打卡记录</h3>
        <div class="history-list" id="history-list"></div>
      </div>
    </section>

    <!-- 新建/编辑目标 -->
    <section id="view-form" class="view">
      <button class="btn-back" data-navigate="dashboard">&larr; 返回</button>
      <h1 id="form-title">新建目标</h1>
      <form class="goal-form glass" id="goal-form">
        <div class="form-group">
          <label for="goal-name">目标名称</label>
          <input type="text" id="goal-name" placeholder="例如：阅读、跑步" required>
        </div>
        <div class="form-group">
          <label for="goal-type">打卡类型</label>
          <select id="goal-type">
            <option value="count">次数打卡</option>
            <option value="time">时长打卡（分钟）</option>
          </select>
        </div>
        <div class="form-group">
          <label for="goal-target">目标值 <span id="target-unit">（次）</span></label>
          <input type="number" id="goal-target" min="1" value="21" required>
        </div>
        <div class="form-group">
          <label for="goal-reward-points">完成奖励积分</label>
          <input type="number" id="goal-reward-points" value="100" min="0">
        </div>
        <input type="hidden" id="goal-edit-id" value="">
        <button type="submit" class="btn btn-primary btn-block">保存</button>
      </form>
    </section>

    <!-- 日历 -->
    <section id="view-calendar" class="view">
      <div class="calendar-header">
        <button class="btn btn-sm" id="cal-prev">&larr;</button>
        <h1 id="cal-title"></h1>
        <button class="btn btn-sm" id="cal-next">&rarr;</button>
      </div>
      <div class="calendar-weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <!-- 财务概要 -->
      <div id="cal-summary" class="cal-summary" style="display:none;">
        <div class="cal-summary-item">
          <span class="cal-summary-label">收入</span>
          <span class="cal-summary-val text-income" id="cal-inc">0</span>
        </div>
        <div class="cal-summary-item">
          <span class="cal-summary-label">支出</span>
          <span class="cal-summary-val text-expense" id="cal-exp">0</span>
        </div>
        <div class="cal-summary-item">
          <span class="cal-summary-label">结余</span>
          <span class="cal-summary-val" id="cal-bal">0</span>
        </div>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
      <div class="calendar-detail glass" id="cal-detail">
        <p class="empty-state" style="padding:16px;">点击日期查看打卡记录</p>
      </div>
    </section>



    <!-- 卡牌图鉴 -->
    <section id="view-cards" class="view">
      <h1>城市卡牌图鉴</h1>
      <p class="cards-subtitle">完成目标即可随机获得全球城市卡牌</p>
      <div class="cards-grid" id="cards-grid"></div>
    </section>

    <!-- 愿望商城 -->
    <section id="view-shop" class="view">
      <div class="shop-header">
        <div>
          <h1>愿望商城</h1>
          <p class="cards-subtitle">用积分为梦想买单</p>
        </div>
        <div class="points-display">
          <span class="points-icon">💎</span>
          <span class="points-value" id="shop-points-display">0</span>
        </div>
      </div>

      <div class="shop-actions">
        <button class="btn btn-primary btn-sm" id="btn-create-item">+ 上架愿望</button>
      </div>

      <div class="shop-shelf">
        <h3>商品货架</h3>
        <div class="shop-grid" id="shop-grid"></div>
      </div>

      <div class="shop-inventory">
        <h3>已购愿望</h3>
        <div class="inventory-list" id="inventory-list">
          <p class="empty-state">暂无已购商品</p>
        </div>
      </div>
    </section>

    <!-- 积分明细弹窗 -->
    <div class="modal-overlay" id="modal-points-history" style="display:none;">
      <div class="modal-content" style="max-height:80vh;display:flex;flex-direction:column;">
        <h2 style="margin-bottom:16px;">积分账单</h2>
        <div id="points-history-list"
          style="overflow-y:auto;flex:1;text-align:left;display:flex;flex-direction:column;gap:8px;">
          <!-- 动态生成 -->
        </div>
        <button class="btn btn-primary btn-block" id="btn-close-history" style="margin-top:16px;">关闭</button>
      </div>
    </div>

    <!-- 上架愿望弹窗 -->
    <div class="modal-overlay" id="modal-create-item" style="display:none;">
      <div class="modal-content" style="text-align:left;">
        <h2 style="margin-bottom:16px;text-align:center;">上架新愿望</h2>
        <form id="create-item-form">
          <div class="form-group">
            <label>愿望名称</label>
            <input type="text" id="item-name" placeholder="例如：看一场电影" required>
          </div>
          <div class="form-group">
            <label>兑换积分</label>
            <input type="number" id="item-cost" value="100" min="10" required>
          </div>
          <div class="form-group">
            <label>图标 (Emoji)</label>
            <input type="text" id="item-icon" value="🎁" placeholder="输入一个 Emoji" maxlength="4">
          </div>
          <div class="form-actions" style="display:flex;gap:10px;margin-top:20px;">
            <button type="button" class="btn btn-block" id="btn-cancel-create">取消</button>
            <button type="submit" class="btn btn-primary btn-block">上架</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 手动补录弹窗 -->
    <div class="modal-overlay" id="modal-manual-add" style="display:none;">
      <div class="modal-content" style="text-align:left;">
        <h2 style="margin-bottom:16px;text-align:center;">📝 手动补录</h2>
        <form id="manual-add-form">
          <div class="form-group">
            <label>选择日期</label>
            <input type="date" id="manual-add-date" required>
          </div>
          <div class="form-group" id="manual-add-minutes-group">
            <label>时长（分钟）</label>
            <input type="number" id="manual-add-minutes" min="1" step="1" value="60" required>
          </div>
          <div class="form-group" id="manual-add-count-group" style="display:none;">
            <label>次数</label>
            <input type="number" id="manual-add-count" min="1" step="1" value="1" required>
          </div>
          <div class="form-group">
            <label>备注（可选）</label>
            <input type="text" id="manual-add-note" class="glass-input" placeholder="例如：昨天忘记记录了">
          </div>
          <div class="form-actions" style="display:flex;gap:10px;margin-top:20px;">
            <button type="button" class="btn btn-block" id="btn-cancel-manual-add">取消</button>
            <button type="submit" class="btn btn-primary btn-block">确认补录</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- 卡牌揭晓弹窗 -->
  <div class="modal-overlay" id="modal-card-reveal" style="display:none;">
    <div class="modal-content">
      <div class="celebration-text">
        <h2>目标达成！</h2>
        <p id="reveal-goal-name"></p>
      </div>
      <div class="card-flip-container" id="card-flip-container">
        <div class="card-flip">
          <div class="card-face card-back">
            <div class="card-back-design">?</div>
          </div>
          <div class="card-face card-front" id="card-front"></div>
        </div>
      </div>
      <p class="reveal-hint" id="reveal-hint">点击卡牌翻转</p>
      <div class="reward-reminder" id="reward-reminder" style="display:none;"></div>
      <button class="btn btn-primary" id="btn-close-reveal" style="display:none;">收下卡牌</button>
    </div>
  </div>

  <!-- 五彩纸屑画布 -->
  <canvas id="confetti-canvas"></canvas>

  <script src="cards.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>

</html>
